<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时页面</title>
    <style>
        /* CSS Reset - 清除默认边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体布局：使用 Flex 保证页脚能沉底 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 最小高度占满整个视口 */
        }

        /* 头部样式 */
        header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 主要内容区域样式 */
        main {
            flex: 1; /* 自动拉伸填充剩余空间 */
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 90%;
        }

        /* 页脚样式 */
        footer {
            background-color: #34495e;
            color: #ffffff;
            text-align: center;
            padding: 15px 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1></h1>
    </header>

    <main>
        <h2></h2>
        <p></p>
        <img src="test.webp" alt="测试图片" style="max-width: 100%; height: auto; display: block; margin: 20px auto;">

        <br>
        <p></p>
    </main>

    <footer>
        <p> | </p>
    </footer>

</body>
</html>
